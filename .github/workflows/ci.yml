name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-lint-type-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install ruff mypy pytest pytest-cov build twine

      - name: Lint
        run: ruff check . --select E9,F63,F7,F82

      - name: Type check
        run: mypy particled/config.py particled/visuals/param_panels.py particled/visuals/particle_cloud/base.py particled/visuals/particle_cloud/impact.py

      - name: Tests with coverage gate
        run: pytest

      - name: Build and validate distribution
        run: |
          python -m build
          twine check dist/*
